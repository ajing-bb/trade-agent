risks:
- name: 日间异象空间漂移
  description: 操场、抽卡池、人群、雕像如果不先锁 master shot，金色异象段会越切越不像同一地点
  mitigation: 先做操场 master shot，再做中间帧 helper 卡和 anomaly 派生机位
- name: 多人对白口型失控
  description: 食堂与操场群嘲镜头存在多人同时说话，直接长视频容易口型和脸同时漂移
  mitigation: 先拆对白覆盖和反应镜头，只给核心人物做明确口型
- name: 夜间强特效吞脸
  description: 哪吒夜间段红天、红柱、法器、虚像叠加后容易让主角脸失真
  mitigation: 先做 scene plate 与法器/VFX keyframe，再分层合成主角
- name: 相邻段接不上
  description: 白天抽卡高潮和夜间抽卡高潮都包含连续状态变化，SD2 直接续跑容易断态
  mitigation: 每个高潮段都预设 midpoint frame、previous-shot state 与 tail frame
