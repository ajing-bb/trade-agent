risks:
- name: 多人对白镜头过载
  description: opening 与 episode_1 的群嘲对白镜头人数多、台词密，直接上长镜头容易跑脸和跑口型。
  mitigation: 先拆成 wide master、单人 reaction 和短对白覆盖，不直接做长段多人 lip-sync。
- name: 白天异象层级过多
  description: 金色天幕、七彩光柱和通天教主卡面 reveal 同时出现，单次生成容易糊成一层。
  mitigation: 先稳住神风学院操场 plate，再分层叠加金色天幕、光柱和卡面近景。
- name: 夜间样片范围外溢
  description: 第3集夜间样片如果同时推进公共抽卡池、宿舍、张家和全城反应，会拉高首轮成本。
  mitigation: 首轮只验证公共抽卡池 + 哪吒异象链路，其他夜景反应场景先保留为 planned。
