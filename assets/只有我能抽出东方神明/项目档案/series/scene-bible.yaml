rules:
- 项目已 fresh reset，场景 canonical 资产待重新建立。
- SD2 默认先锁定场景 master shot，再派生中景、反打和 continuity helper 卡
- 抽卡池相关场景必须把抽卡池本体、地面纹理、学院或城市背景一起固定，避免后续空间漂移
- 夜景异象场景优先先做无人物 plate，再合成主角和 VFX
locations:
- id: LOC_KAMIKAZE_ACADEMY_GROUNDS_DAY
  name: 神风学院操场
  function: 开场世界建立、围观抽卡、日间金色异象降临
  status: planned
  asset_root: assets/只有我能抽出东方神明/场景/LOC_KAMIKAZE_ACADEMY_GROUNDS_DAY
  prompt_pack: assets/只有我能抽出东方神明/项目档案/series/scene-asset-prompt-pack.yaml
  time: day
  weather: clear
  environment_type: 西式学院广场
  anchors:
  - 抽卡池位于操场中央
  - 学院主体建筑在远景可见
  - 跑道与铺地分区明确
  - 西方神魔雕像围绕抽卡区域
  signature_assets:
  - 抽卡池
  - 西方神魔雕像
  - 金色天空
  - 七彩光柱
  camera_seeds:
  - front wide
  - pool-side medium
  - high angle overview
  - low-angle anomaly reveal
  reverse_shot_needed: true
  crowd_policy: 群演以 6-8 个学生模板循环复用，核心对白尽量拆开
  must_not_drift:
  - 抽卡池始终在中央
  - 学院建筑和雕像关系稳定
  acceptable_variation:
  - 人群密度
  - 天空光照强度
  high_risk_angles:
  - high-angle crowd
  - anomaly reverse shot
