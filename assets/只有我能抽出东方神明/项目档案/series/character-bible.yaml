notes:
- 首轮先锁孟江，再补齐学院公开抽卡仪式相关 speaking cast。
- status 约定：planned=已入 canon 未进入当前轮主攻，prompted=已纳入当前轮提示词，committed=已有仓库落盘母资产。
characters:
- id: CHAR_MENGJIANG
  name: 孟江
  status: committed
  asset_root: assets/只有我能抽出东方神明/角色/CHAR_MENGJIANG
  role: male academy student protagonist
  narrative_function: 穿越者男主，唯一能抽出东方神明卡牌的异类召唤者。
  face_anchors:
  - sharp young East Asian face
  - calm determined eyes
  - straight nose bridge
  - clean jawline
  hair_headwear: black layered short hair, clean forehead, no accessories
  visual_anchors:
  - restrained underdog aura before awakening
  - upright posture under public pressure
  - modern academy silhouette with mythic undertone
  costume_core: black academy uniform with muted gold trim, white inner shirt, fitted
    trousers
  material_texture: matte school fabric, restrained metallic trim, no glossy leather
  color_anchors:
  - black
  - charcoal
  - muted gold
  - off white
  body_silhouette: lean athletic young male, long legs, clean upright stance
  required_angles:
  - front hero full body
  - left-facing pure side
  - pure back
  - waist-up intense reaction
  first_story_units:
  - opening
  - episode_1
  - episode_2
  - episode_3
  continuity_warnings:
  - 不能从普通校园男主漂成偶像美型或成熟总裁。
  - 异象前后只允许气场变化，不允许角色本体换脸换发型。
