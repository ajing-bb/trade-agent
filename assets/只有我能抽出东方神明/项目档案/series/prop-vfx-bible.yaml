  prompt_pack: assets/只有我能抽出东方神明/项目档案/series/prop-vfx-asset-prompt-pack.yaml
  visual_anchors:
  - 古朴东方神性卡面
  - 区别于西方卡牌系统
  - 有厚重上古感
- id: CARD_NEZHA
  name: 哪吒卡
  function: 夜间抽卡兑现力量的核心卡牌
