rules:
- 已完成第一轮文字级道具与 VFX 锁定，当前待补 canonical masters。
- 抽卡池装置已进入 prompted 阶段；卡片、雕像优先做下一批 Midjourney 母版。
- 通天教主卡、哪吒卡，以及金色/赤红主异象已进入 prompted，作为第二批符号与特效资产。
- 金色通天教主异象与赤红哪吒异象必须在色相、亮度和粒子节奏上明确区分。
props:
- id: PROP_DRAW_POOL_DEVICE
  name: 抽卡池装置
  function: 学院版与公共版抽卡的核心仪式设备，也是所有异象起点。
  status: prompted
  asset_root: assets/只有我能抽出东方神明/道具/PROP_DRAW_POOL_DEVICE
  prompt_pack: assets/只有我能抽出东方神明/项目档案/series/prop-vfx-asset-prompt-pack.yaml
  visual_anchors:
  - 石质主体
  - 少量金属嵌件
  - 卡槽和按钮清晰
  - 兼具祭坛与机器感
  must_not_drift:
  - 不要变成纯科幻机器
  - 不要变成简陋喷泉
- id: PROP_WESTERN_GOD_STATUE_CLUSTER
  name: 西方神魔雕像组
  function: 说明世界只承认西方神魔体系。
  status: planned
  visual_anchors:
  - 冷硬石雕
  - 西方神话翅翼或盔甲语汇
  - 学院广场轴线列阵
  must_not_drift:
  - 不要混入东方神像轮廓
- id: PROP_SUMMON_CARD_STANDARD
  name: 标准召唤卡
  function: 常规抽卡结果与贴额触发动作的基础卡面模板。
  status: planned
  visual_anchors:
  - 掌心尺寸
  - 古朴符文边框
  - 圣物质感
  must_not_drift:
  - 不要做成现代银行卡或数码卡牌
- id: CARD_TONGTIANJIAOZHU
  name: 通天教主卡
  function: 第一次抽出的东方神明卡，负责金色天空与七彩光柱异象。
  status: prompted
  asset_root: assets/只有我能抽出东方神明/道具/CARD_TONGTIANJIAOZHU
  prompt_pack: assets/只有我能抽出东方神明/项目档案/series/prop-vfx-asset-prompt-pack.yaml
  visual_anchors:
  - 古朴压迫感
  - 东方神性图腾
  - 与标准卡同体系但更古老
  must_not_drift:
  - 不要做成Q版神卡
  - 不要和哪吒卡共用主色
- id: CARD_NEZHA
  name: 哪吒卡
  function: 夜间真正显化力量的东方神明卡。
  status: prompted
  asset_root: assets/只有我能抽出东方神明/道具/CARD_NEZHA
  prompt_pack: assets/只有我能抽出东方神明/项目档案/series/prop-vfx-asset-prompt-pack.yaml
  visual_anchors:
  - 赤红主调
  - 少年战神感
  - 与火轮长枪红绫形成统一符号
  must_not_drift:
  - 不要做成西方战士卡
vfx:
- id: VFX_DEMON_WING_SUMMON
  name: 恶魔之翼显化
  function: 开场示范西方神魔体系的标准化召唤反馈。
  status: planned
- id: VFX_EASTERN_SHADOW_REVEAL
  name: 东方神明虚影显现
  function: 开场冻结在孟江身后的东方神明群像伏笔。
  status: planned
- id: VFX_GOLDEN_SKY_OMEN
  name: 金色天空异象
  function: 通天教主卡出现前的天空染金级别异象。
  status: prompted
  asset_root: assets/只有我能抽出东方神明/VFX/VFX_GOLDEN_SKY_OMEN
  prompt_pack: assets/只有我能抽出东方神明/项目档案/series/prop-vfx-asset-prompt-pack.yaml
- id: VFX_RAINBOW_DESCENT_PILLAR
  name: 七彩降临光柱
  function: 从天而降包裹抽卡池的高阶降临信号。
  status: prompted
  asset_root: assets/只有我能抽出东方神明/VFX/VFX_RAINBOW_DESCENT_PILLAR
  prompt_pack: assets/只有我能抽出东方神明/项目档案/series/prop-vfx-asset-prompt-pack.yaml
- id: VFX_RED_SKY_FIRE_OMEN
  name: 赤红天穹火相异象
  function: 哪吒卡抽取时点燃整座城市夜空。
  status: prompted
  asset_root: assets/只有我能抽出东方神明/VFX/VFX_RED_SKY_FIRE_OMEN
  prompt_pack: assets/只有我能抽出东方神明/项目档案/series/prop-vfx-asset-prompt-pack.yaml
- id: VFX_RED_ASCENT_PILLAR
  name: 赤红冲天光柱
  function: 从公共抽卡池冲天而起的夜间主光柱。
  status: prompted
  asset_root: assets/只有我能抽出东方神明/VFX/VFX_RED_ASCENT_PILLAR
  prompt_pack: assets/只有我能抽出东方神明/项目档案/series/prop-vfx-asset-prompt-pack.yaml
- id: VFX_NEZHA_WEAPON_MANIFEST
  name: 火轮长枪红绫显化
  function: 哪吒力量体系的法器先行显形阶段。
  status: prompted
  asset_root: assets/只有我能抽出东方神明/VFX/VFX_NEZHA_WEAPON_MANIFEST
  prompt_pack: assets/只有我能抽出东方神明/项目档案/series/prop-vfx-asset-prompt-pack.yaml
- id: VFX_NEZHA_DHARMA_FORM
  name: 哪吒三头六臂法相
  function: 夜间抽卡成功后的最终力量显化。
  status: planned
