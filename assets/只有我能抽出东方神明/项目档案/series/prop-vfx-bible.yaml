rules:
- 先建立抽卡池、通用卡片、雕像群和核心异象套件，再补细分卡面与武器层。
- 卡面与 VFX 统一保留“西方体系 vs 东方体系”的显著视觉差异。
props:
- id: PROP_DRAW_POOL_MAIN
  name: 抽卡池
  status: prompted
  asset_root: assets/只有我能抽出东方神明/道具/PROP_DRAW_POOL_MAIN
  function: 公开抽卡仪式与夜间公共抽卡的核心设施。
  visual_anchors:
  - circular ceremonial machine-pool hybrid structure
  - central output slot and button area
  - readable pedestal silhouette
  continuity_use:
  - opening
  - episode_1
  - episode_3
- id: CARD_SUMMON_CARD_BASE
  name: 通用抽卡卡片
  status: prompted
  asset_root: assets/只有我能抽出东方神明/道具/CARD_SUMMON_CARD_BASE
