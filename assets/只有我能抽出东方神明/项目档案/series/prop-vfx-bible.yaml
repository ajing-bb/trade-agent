rules:
- 项目已 fresh reset，道具与 VFX canonical 资产待重新建立。
- 抽卡池、卡片、法器、异象分开建档，避免一个 master 图承担过多职责
- SD2 中强特效镜头优先采用 scene plate + effect overlay，不让 VFX 直接吞掉角色脸
props:
- id: PROP_DRAW_POOL_MAIN
  name: 抽卡池
  function: 世界核心装置，日夜两场异象的共同承载体
  status: planned
  asset_root: assets/只有我能抽出东方神明/道具/PROP_DRAW_POOL_MAIN
  prompt_pack: assets/只有我能抽出东方神明/项目档案/series/prop-vfx-asset-prompt-pack.yaml
  visual_anchors:
  - 圆形或祭坛式主池体
  - 中央按钮或操作区
  - 出卡口清晰可见
  - 自带神秘符文和能量槽结构
- id: PROP_WESTERN_STATUE_SET
  name: 西方神魔雕像组
  function: 体现世界长期被西方神魔体系支配的环境符号
  status: planned
  asset_root: assets/只有我能抽出东方神明/道具/PROP_WESTERN_STATUE_SET
  prompt_pack: assets/只有我能抽出东方神明/项目档案/series/prop-vfx-asset-prompt-pack.yaml
  visual_anchors:
  - 石雕质感
  - 西式神魔造型
  - 学院广场装饰比例统一
- id: CARD_TONGTIAN_JIAOZHU
  name: 通天教主卡
  function: 孟江第一次抽出的东方神明卡，异象巨大但当场未兑现
