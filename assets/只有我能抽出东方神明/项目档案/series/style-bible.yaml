style_name: 国风玄幻校园2.5D漫剧
core_format: 2.5D manhua
overall_density: medium
realism_level: semi-flat
line_and_render:
  line_quality: clean comic linework
  shadow_depth: 2-step to light 2.5D
  skin_finish: matte
  hair_finish: grouped locks with a few loose strands
  fabric_finish: medium folds, readability first
color_and_light:
  day_palette:
    - 冷灰校园
    - 金色异象覆盖
  night_palette:
    - 冷蓝黑夜景
    - 赤红异象
  academy_base_palette:
    - 黑
    - 白
    - 暗金
  vfx_split_rules:
    tongtian: 古朴金彩祥光
    nezha: 赤金火焰
world_design:
  school_uniform_system: 同校统一黑金体系
  architecture_language: 西式魔法学院建筑与西方神魔雕像
  prop_language: 清晰可读轮廓优先
camera_rules:
  default_framing: 中景与全身设定图优先
  dialogue_coverage: 反打稳定优先
  vfx_hero_shots: 先分层锁静帧再做动态
failure_boundaries:
  - 不要漂成glossy乙游立绘
  - 不要漂成韩系写真脸
  - 不要漂成过萌甜妹日漫
  - 不要漂成过写实厚涂
