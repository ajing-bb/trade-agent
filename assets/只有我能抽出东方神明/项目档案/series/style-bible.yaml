style_name: 东方神明校园抽卡漫剧
core_format: 2D manhua
overall_density: 中高信息密度，优先可读轮廓与异象识别，不堆满碎纹理。
realism_level: semi-flat
reference_warning:
- 不要跑成韩漫恋爱番、乙游海报、写实影视分镜或欧美写实卡牌插画。
- 同一集内保持学院基础制服系统一致，不因角色高低配而跳风格。
- 东方神明异象要与西方神魔雕像体系形成明显视觉对照，但仍属于同一部作品。
line_and_render:
  line_quality: hard-clean with selective weight change
  shadow_depth: 2-step cel shade with restrained rim light
  skin_finish: matte with slight warm highlight
  hair_finish: grouped locks first, detail strands second
  fabric_finish: medium folds, readable silhouette before texture
  metallic_finish: limited bright edges, no mirror chrome
color_and_light:
  academy_day_base:
  - cool neutral concrete
  - desaturated academy gray
  - restrained navy-black uniform base
  - controlled gold accents only for hero or anomaly moments
  eastern_anomaly_palette:
  - imperial gold
  - warm amber
  - rainbow spectral highlight
  nezha_night_palette:
  - ember red
  - fiery orange
  - deep charcoal night
  western_world_palette:
  - stone gray
  - oxidized bronze
  - muted black-purple only as background religion system accent
world_design:
  academy_system: 现代校园空间里嵌入抽卡宗教设施，抽卡池和雕像是视觉中心。
  eastern_vs_western: 西方神魔体系走雕像、翅膀、徽章、石材与金属；东方神明体系走天幕、法相、法器和高压能量轮廓。
  crowd_strategy: 群演优先作为形体块面，不在首轮追求逐个面孔精修。
camera_rules:
  shot_priority:
  - 先做 wide master，再做单人反应，再做对白覆盖。
  - 高难 VFX 镜头先做静帧或首尾帧，不直接长视频硬冲。
  lens_bias:
  - 学院公开抽卡使用中广角与低机位 hero push-in。
  - 群嘲对白保持中景或半身，减少多人长对白口型压力。
  - 东方神明 reveal 镜头用定格、推近、压迫式仰拍。
failure_boundaries:
- 不做高写实皮肤、电影级景深噪点和镜头污渍。
- 不让东方神明特效变成纯西方魔法阵或赛博霓虹特效。
- 不在首轮尝试高复杂多人打斗或长段精确 lip-sync。
