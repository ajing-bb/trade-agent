style_name: 东方神明抽卡学院漫剧
core_format: 2D manhua
overall_density: medium
realism_level: semi-flat
reference_warning:
- 不要跑成 glossy 乙游立绘
- 不要跑成韩系写真脸
- 不要跑成高饱和萌系校园番
- 不要跑成重写实电影质感
line_and_render:
  line_quality: hard-clean with selective weight change
  shadow_depth: 2-step cel shade with restrained rim light
  skin_finish: matte with slight warm highlight
  hair_finish: grouped locks first, detail strands second
  fabric_finish: medium folds, readable silhouette before texture
  metallic_finish: limited bright edges, no mirror chrome
color_and_light:
  day_palette:
  - 学院灰白
  - 深蓝制服
  - 克制肤色暖调
  night_palette:
  - 深蓝黑夜
  - 城市冷灰
  - 异象反射色作为唯一高饱和来源
  gold_fire_energy_palette:
    golden_event: 金色天空 + 七彩光柱，偏神圣昭示
    nezha_event: 赤红天幕 + 红色光柱，偏压迫与灼烧
  academy_base_palette:
  - 石灰白
  - 冷灰蓝
  - 深金点缀
  contrast_policy: medium-high
  highlight_policy: restrained in daily shots, strong only on异象与法器
world_design:
  school_uniform_system: 神风学院制服统一为深色学院装，主角与核心人物在剪裁细节上区分身份，不走潮流校服路线
  architecture_language: 西式学院建筑、雕像与广场装置构成世界主视觉，强调西方神魔统治感
  prop_language: 抽卡池、卡片、法器都要有强识别轮廓，卡片与神像系统要明显区分东西方阵营
  vfx_split_rules: 日间异象偏金色圣示，夜间异象偏赤红压迫，避免所有特效混成同一类金闪闪
  east_vs_west_visual_contrast: 西方神魔体系偏冷灰石雕与规则秩序，东方神明降临偏高纯度能量和强气场轮廓
camera_rules:
  default_framing: 先中景和可读全景，确保抽卡池、人群、主角站位稳定
  dialogue_coverage: 多人对白优先拆成双人或单人反应，不直接长时间群像口型
  reveal_shots: 神明与异象 reveal 先锁定静帧，再决定是否做低角度英雄机位
  vfx_hero_shots: 特效英雄镜头优先 scene plate + effect overlay，不让人物脸承担全部特效压力
  crowd_policy: 群演作为软背景模板复用，核心人物与群演层分开规划
failure_boundaries:
- 不要把主角定稿做成过重逆光海报脸，否则后续 SD2 引用会把光影当身份
- 不要让金色异象和红色异象共用同一套颜色逻辑
- 不要在一个镜头里同时要求多人对白、强特效、长机位运动
- 不要把辅助 continuity 卡直接当成正片首帧构图
