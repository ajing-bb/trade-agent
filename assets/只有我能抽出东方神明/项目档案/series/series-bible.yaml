story_form: AI漫剧
story_hook: 穿越男主在只承认西方神魔的抽卡世界里，独自抽出东方神明并重写力量秩序。
genre:
- 学院
- 抽卡
- 东方神明
- 热血逆袭
- 异象奇观
world_rules:
- 年满十八即可在抽卡池抽卡，并获得卡片对应神魔体系的能力。
- 学院、家族与社会权力结构默认围绕西方神魔体系建立，普通人几乎不知道东方神明的存在。
- 抽卡异象会随卡片层级与力量属性放大，强异象足以惊动学院高层、家族势力与整座城市。
- 东方神明属于该世界既有认知体系外的异常力量，首次现世必须在视觉上与西方神魔明确区隔。
- 过强神明之力存在承载门槛，人物可能出现抽到卡却暂时无法稳定显化的情况。
production_rules:
- 先角色后场景再道具和VFX
- 角色资产优先走 Face Draft -> Full Body Master -> Banana Derived Pack
- Midjourney 只做各类资产的第一个 canonical base / master asset，不负责后续派生包
- Banana Pro 统一基于定稿做后续派生，例如角色三视图、表情、角度，场景反打与机位变体，道具变体，VFX look-dev 变体
- Banana Pro 派生提示词默认显式写 请参考当前资产定稿 或 请参考当前人物全身照
 - 当前批次先做文字级 canon 锁定，再制作第一批 master assets
canonical_rules:
- 本目录与 episodes 中已确认的档案文件，构成本项目的 canonical memory
- 后续续集、资产补画、Seedance prompt、角色返修，默认先读 canonical 档案，再参考聊天记录
- 如果聊天结论与仓库档案冲突，以仓库中最新确认版本为准
- 临时探索图、未落盘图片、未写回档案的 prompt 结论，不视为 canonical
current_import_notes:
- script-normalized 与 breakdown 已覆盖 opening ~ episode_3。
- series 下已完成第一轮文字级 style / character / scene / prop-vfx canon 锁定。
- 当前尚无视觉资产 committed，下一步应先制作孟江、学院操场、公共抽卡池与抽卡池装置的 master assets。
