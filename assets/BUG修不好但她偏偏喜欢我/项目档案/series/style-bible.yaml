style_name: 都市夜班写实恋爱短剧
core_format: 2.5D manhua
overall_density: medium
realism_level: semi-real
reference_warning:
- 不要漂移成 glossy 乙游立绘
- 不要漂移成韩系写真脸或医美海报风
- 不要漂移成夸张搞笑短视频 meme 脸
- 不要漂移成黑暗赛博朋克或高饱和夜店风
line_and_render:
  line_quality: mixed clean linework
  shadow_depth: 2-step soft realism
  skin_finish: matte with soft highlight
  hair_finish: soft strands with grouped silhouette
  fabric_finish: medium folds, lived-in office wear
color_and_light:
  day_palette:
  - cool gray white
  - muted blue glass reflection
  - low-saturation office beige
  night_palette:
  - fluorescent white
  - convenience-store warm amber
  - deep navy city night
  accent_palette:
    ZhouChen: charcoal, washed navy, muted gray
    LinXia: ivory, soft camel, rose beige
    office_alert: monitor cyan, warning red
  office_base_palette: low-saturation concrete gray, cool metal, old wood veneer
  contrast_policy: medium
  highlight_policy: restrained but readable on faces
world_design:
  office_costume_system: 程序员是重复穿着的基础卫衣、衬衫、工牌与双肩包体系；内容团队更轻时髦但不过度时装化。
  architecture_language: 当代商务写字楼，玻璃、金属、灯箱、便利店与公共茶水间构成主要空间识别。
  prop_language: 纸杯、工牌、笔记本电脑、泡面、手机通知栏与直播物料都应走真实职场用品路线。
  relationship_visual_contrast: 男主偏暗偏旧，女主偏亮偏净，但两人都处在同一写字楼光照逻辑内。
  screen_ui_language: 手机项目群与报错日志以现代中文办公软件界面表达，不要科幻HUD。
camera_rules:
  default_framing: 手机镜头观察感，中近景优先，偶尔给稳定的环境中景建立真实空间。
  dialogue_coverage: 以双人中景、轻微侧身反打和站位关系为主，不做过度电影化大摇臂。
  reveal_shots: 女主出场更多从生活化动作里显出吸引力，不做纯慢动作女神降临。
  phone_camera_feel: 允许轻微手持感和真实曝光，但主体脸部必须干净稳定。
  crowd_policy: 路人和同事默认软背景处理，除产品经理和男主播同事外不做高识别单独建模。
failure_boundaries:
- 不要把男主做成邋遢脏乱、秃化夸张或老人化病态形象
- 不要把女主做成擦边主播或直播平台封面模板脸
- 不要使用高对比紫蓝霓虹覆盖整部作品
- 不要让场景变成高级样板间，必须保留加班写字楼的生活磨损感
