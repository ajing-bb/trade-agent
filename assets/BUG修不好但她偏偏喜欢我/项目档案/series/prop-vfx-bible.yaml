rules:
- 本项目无超自然 VFX，优先锁真实职场道具，不要过早做花哨特效设计。
- 道具优先支持角色识别与场景复用，例如工牌、纸杯、电脑报错界面和手机通知UI。
- 若后续出现屏幕消息镜头，优先走道具/UI 设计，不要误归类到 VFX。
