rules:
- 同一栋写字楼是本项目最重要的连续性容器，便利店、电梯口、茶水间、天台都必须保持在同一建筑体系内。
- 夜景为主，但不走霓虹赛博风，必须保留真实办公楼荧光灯、玻璃反射和便利店暖光的日常感。
- 便利店、电梯口、天台出口属于高复用场景，必须先做可反打的母图。
locations:
