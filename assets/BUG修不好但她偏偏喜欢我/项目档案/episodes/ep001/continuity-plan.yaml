risks:
- name: 主CP脸部漂移
  description: 周沉与林夏在便利店、电梯和天台都出现，若主角脸和体态不先锁，后续镜头会迅速失真。
  mitigation: 先产出主角 face draft、full body master 和基础对话角度包，再进入镜头制作。
- name: 同楼写字楼空间割裂
  description: 便利店、电梯口、茶水间、门口台阶、露台都属于同一栋楼，若建筑语汇不统一，观众会失去连续空间感。
  mitigation: 所有场景母图共享同一建筑材料、灯光温度和写字楼门禁系统。
- name: 夜景光源失控
  description: 本集夜景占比很高，容易被生成成霓虹赛博风或夜店光。
  mitigation: 固定冷白办公灯 + 便利店暖光 + 城市远景蓝灰夜色的三层光源逻辑。
- name: 女主过度网红化
  description: 林夏如果被做成主播封面模板脸，会破坏现实职场感。
  mitigation: 保持轻透妆、现实穿搭和写字楼内容岗位气质，不做擦边造型。
